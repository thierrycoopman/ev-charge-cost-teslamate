version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Tesla Sync — runs alongside TeslaMate's Docker stack
#
# Uses the pre-built image from GitHub Container Registry.
# To build locally instead, use the override file:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# First-time setup:
#   1. cp .env.example .env  →  fill in TESLAMATE_NETWORK, DB URL, EVC creds
#   2. docker network ls | grep tesla  →  find your TeslaMate network name
#   3. docker compose up -d
#   4. docker compose exec tesla-sync python scripts/auth.py  (once only)
# ─────────────────────────────────────────────────────────────────────────────

services:
  tesla-sync:
    # Pre-built multi-platform image (amd64 + arm64).
    # Pin to a specific version for production stability, e.g. :1.0.0
    image: ghcr.io/thierrycoopman/tesla-sync:latest

    container_name: tesla-sync
    restart: unless-stopped

    # All secrets / config come from .env — never hard-coded here.
    env_file: .env

    volumes:
      # Named volume: persists the Tesla token across rebuilds and restarts.
      # Only 'docker compose down -v' removes this — plain 'down' keeps it.
      - tesla-sync-data:/app/data

      # Bind mount: log files are readable directly on the host in ./logs/
      - ./logs:/app/logs

      # Optional: multi-network EVC-Net accounts file.
      # Copy evc_accounts.example.json → evc_accounts.json, fill in credentials,
      # then uncomment the line below and set EVC_ACCOUNTS_FILE in .env.
      # - ./evc_accounts.json:/app/evc_accounts.json:ro

    networks:
      - teslamate_net

volumes:
  # Stores ~/.tesla_tokens.json equivalent inside the container.
  # Survives: container restarts, image updates, docker compose down.
  # Lost on:  docker compose down -v (requires re-authentication).
  tesla-sync-data:

networks:
  # Joins TeslaMate's internal Docker network so the container can reach
  # the 'database' service directly — no port exposure needed.
  # Set TESLAMATE_NETWORK in .env to match your actual network name.
  # Find it with: docker network ls | grep tesla
  teslamate_net:
    external: true
    name: ${TESLAMATE_NETWORK:-teslamate_default}
